<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Datasheets — Luminaton Customer Cabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/cabinet/cabinet.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="dg1" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#FFB400" />
                <stop offset="1" stop-color="#00B8D4" />
              </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="6" fill="url(#dg1)" />
          </svg>
        </span>
        <span class="brand-name">Luminaton</span>
      </a>
      <nav class="primary-nav" aria-label="Primary">
        <ul class="nav-menu">
          <li class="cabinet-user"><span id="userEmail" class="muted small">…</span></li>
          <li><button id="logoutBtn" class="btn btn-ghost btn-sm">Sign out</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container cabinet-main">
    <header class="cabinet-head">
      <span class="eyebrow">Customer Cabinet</span>
      <h1>Product Datasheets</h1>
      <p class="muted">
        Download technical specifications for every Luminaton product line.
        Looking for something specific? <a href="/#contact">Get in touch</a> and we'll send it directly.
      </p>
      <div class="cabinet-search">
        <input type="search" id="search" placeholder="Search datasheets…" aria-label="Search datasheets" />
      </div>
    </header>

    <section id="catalog" class="catalog">
      <p class="muted" id="loadingMsg">Loading datasheets…</p>
    </section>
  </main>

  <script src="/cabinet/cabinet.js" defer></script>
</body>
</html>
