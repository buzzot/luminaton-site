<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Check your email — Luminaton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/cabinet/cabinet.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="6" fill="#FFB400" />
          </svg>
        </span>
        <span class="brand-name">Luminaton</span>
      </a>
    </div>
  </header>

  <main class="cabinet-shell">
    <section class="auth-card center">
      <div class="auth-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="64" height="64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="14" width="48" height="36" rx="4" />
          <path d="M8 18l24 18 24-18" />
        </svg>
      </div>
      <h1>Check your inbox</h1>
      <p class="muted">
        We just sent a sign-in link to <strong id="emailTarget">your email</strong>.
        Click the link in the email — it's valid for 15 minutes — and you'll be signed straight in.
      </p>
      <p class="muted small">
        Don't see it? Check your spam folder, or
        <a href="/cabinet/">request a new link</a>.
      </p>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const to = params.get('to');
    if (to) document.getElementById('emailTarget').textContent = to;
  </script>
</body>
</html>
