<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Submit Inquiry — Luminaton Customer Cabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/cabinet/cabinet.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="ng1" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#FFB400"/><stop offset="1" stop-color="#00B8D4"/></linearGradient></defs>
            <circle cx="16" cy="16" r="6" fill="url(#ng1)" />
          </svg>
        </span>
        <span class="brand-name">Luminaton</span>
      </a>
      <nav class="primary-nav" aria-label="Primary">
        <ul class="nav-menu">
          <li class="cabinet-user"><span id="userEmail" class="muted small">…</span></li>
          <li><button id="logoutBtn" class="btn btn-ghost btn-sm">Sign out</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="cabinet-subnav-wrapper">
    <div class="container cabinet-subnav" id="subnav">
      <a href="/cabinet/dashboard">Datasheets</a>
      <a href="/cabinet/inquiries/" class="active">My Inquiries</a>
      <a href="/cabinet/admin" class="admin-only" hidden>Admin</a>
    </div>
  </div>

  <main class="container cabinet-main narrow">
    <header class="cabinet-head left">
      <h1>Submit a new inquiry</h1>
      <p class="muted">Tell us about your project. We'll review the details and reply with pricing and recommendations within one business day. All fields are required.</p>
    </header>

    <form id="inquiryForm" class="inquiry-form" novalidate enctype="multipart/form-data">
      <div class="form-row">
        <label for="projectName">Project name <span aria-hidden="true">*</span></label>
        <input type="text" id="projectName" name="projectName" required maxlength="200" placeholder="e.g. Channel letters for Acme retail" />
      </div>

      <div class="form-row">
        <label for="description">Project description <span aria-hidden="true">*</span></label>
        <textarea id="description" name="description" rows="6" required maxlength="8000" placeholder="Specs (color temperature, voltage, IP rating, quantity, dimensions), timeline, destination country, anything else we should know…"></textarea>
      </div>

      <div class="form-row">
        <label for="attachments">Attachments <span aria-hidden="true">*</span> <span class="hint">up to 10 files, 10 MB each</span></label>
        <div class="file-picker">
          <input type="file" id="attachments" name="attachments" multiple required />
          <label for="attachments" class="file-picker-button">Choose files…</label>
          <p class="muted small file-picker-hint">PDF, images, Office, CAD, ZIP. No executables.</p>
        </div>
        <ul id="fileList" class="file-list"></ul>
      </div>

      <fieldset class="form-fieldset">
        <legend>Contact person</legend>
        <div class="form-row">
          <label for="contactName">Full name <span aria-hidden="true">*</span></label>
          <input type="text" id="contactName" name="contactName" required maxlength="120" />
        </div>
        <div class="form-row two-col">
          <div>
            <label for="contactPhone">Phone <span aria-hidden="true">*</span></label>
            <input type="tel" id="contactPhone" name="contactPhone" required maxlength="60" placeholder="+1 555 0123" />
          </div>
          <div>
            <label for="contactEmail">Email <span aria-hidden="true">*</span></label>
            <input type="email" id="contactEmail" name="contactEmail" required maxlength="200" />
          </div>
        </div>
      </fieldset>

      <div class="form-actions">
        <a href="/cabinet/inquiries/" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary" id="submitBtn">Submit inquiry</button>
      </div>

      <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="/cabinet/cabinet-shared.js" defer></script>
  <script src="/cabinet/inquiry-new.js" defer></script>
</body>
</html>
